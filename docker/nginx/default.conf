# SanguiBlog Docker Nginx 站点配置
# 参考 fake-nginx-config/nginx.conf（旧宿主机部署）
# Docker 部署以本文件为准

server {
    listen 80;
    server_name localhost;

    client_max_body_size 60m;

    # ---- 真实客户端 IP（ngx_http_realip_module） ----
    # 信任 Docker 内网代理来源，使 $remote_addr 反映真实客户端 IP
    # 而非 Docker bridge/gateway 地址（如 172.29.0.1）。
    # 如果前面还有一层主机级反代（Caddy/Nginx/Cloudflare），
    # 请根据实际拓扑将上游 IP 段加入 set_real_ip_from。
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;

    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # 前端 SPA 根目录（由前端 Dockerfile 多阶段构建产出）
    root /usr/share/nginx/html;
    index index.html;

    # ---- 站点地图与 robots（必须优先走后端，否则会被 SPA fallback 捕获）----
    location = /sitemap.xml {
        proxy_pass http://backend:8080/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        proxy_pass http://backend:8080/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- AI SSE 流式聊天（必须关闭缓冲，放在 /api/ 前面）----
    location = /api/ai/chat/stream {
        proxy_pass http://backend:8080/api/ai/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        add_header X-Accel-Buffering no;
    }

    # ---- 后端 API 代理 ----
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- 上传资源 /uploads/games/ 需特殊 CSP 允许同源 iframe ----
    location /uploads/games/ {
        alias /data/uploads/games/;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'self'; form-action 'self'; upgrade-insecure-requests";
        add_header X-Frame-Options SAMEORIGIN;
    }

    # ---- 上传资源静态访问 ----
    location /uploads/ {
        alias /data/uploads/;
    }

    # ---- 兼容后端历史头像路径 /avatar/{filename} ----
    location /avatar/ {
        alias /data/uploads/avatar/;
    }

    # ---- SPA 前端路由回退（放在最后）----
    location / {
        try_files $uri /index.html;
    }
}
