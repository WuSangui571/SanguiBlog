# SanguiBlog Docker Compose
# 启动: docker compose up -d --build
# 停止: docker compose down
# 清理数据: docker compose down -v

services:
  web:
    build:
      context: .
      dockerfile: ./SanguiBlog-front/Dockerfile
    container_name: sanguiblog-web
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sanguiblog-net

  backend:
    build:
      context: ./SanguiBlog-server
      dockerfile: Dockerfile
    container_name: sanguiblog-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-sanguiblog_db}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4&allowPublicKeyRetrieval=true}"
      SPRING_DATASOURCE_USERNAME: "${SPRING_DATASOURCE_USERNAME:-${MYSQL_USER:-sanguiblog_user}}"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD:-${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}}"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required}"
      STORAGE_BASE_PATH: "${STORAGE_BASE_PATH:-/data/uploads}"
      SITE_BASE_URL: "${SITE_BASE_URL:-http://localhost}"
      SITE_ALLOWED_HOSTS: "${SITE_ALLOWED_HOSTS:-localhost}"
      SITE_ASSET_BASE_URL: "${SITE_ASSET_BASE_URL:-/uploads}"
      SECURITY_CORS_ALLOWED_ORIGINS: "${SECURITY_CORS_ALLOWED_ORIGINS:-http://localhost}"
      AI_RAG_ENABLED: "${AI_RAG_ENABLED:-false}"
      AI_RAG_PGVECTOR_URL: "${AI_RAG_PGVECTOR_URL:-jdbc:postgresql://pgvector:5432/${POSTGRES_DB:-sanguiblog_ai}}"
      AI_RAG_PGVECTOR_USERNAME: "${AI_RAG_PGVECTOR_USERNAME:-${POSTGRES_USER:-sanguiblog_pg_user}}"
      AI_RAG_PGVECTOR_PASSWORD: "${AI_RAG_PGVECTOR_PASSWORD:-${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}}"
      AI_RAG_PGVECTOR_INITIALIZE_SCHEMA: "${AI_RAG_PGVECTOR_INITIALIZE_SCHEMA:-false}"
      SPRING_AI_DASHSCOPE_API_KEY: "${AI_DASHSCOPE_API_KEY:-}"
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      mysql:
        condition: service_healthy
      pgvector:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sanguiblog-net

  mysql:
    image: mysql:8.0
    container_name: sanguiblog-mysql
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-sanguiblog_db}"
      MYSQL_USER: "${MYSQL_USER:-sanguiblog_user}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sanguiblog_db.sql:/docker-entrypoint-initdb.d/01-sanguiblog_db.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - sanguiblog-net

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: sanguiblog-pgvector
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-sanguiblog_ai}"
      POSTGRES_USER: "${POSTGRES_USER:-sanguiblog_pg_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sanguiblog_pg_user} -d ${POSTGRES_DB:-sanguiblog_ai}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - sanguiblog-net

volumes:
  mysql_data:
  pgvector_data:
  uploads_data:

networks:
  sanguiblog-net:
    driver: bridge
