name: Docker Images

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Custom image tag (default: git sha)"
        required: false
        type: string
        default: ""

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/wusangui571/sanguiblog/sanguiblog-web
  BACKEND_IMAGE: ghcr.io/wusangui571/sanguiblog/sanguiblog-backend

jobs:
  check:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Compose config check
        env:
          JWT_SECRET: ci_dummy_jwt_secret_at_least_32_chars
          MYSQL_PASSWORD: ci_mysql_password
          MYSQL_ROOT_PASSWORD: ci_mysql_root_password
          POSTGRES_PASSWORD: ci_postgres_password
          SPRING_DATASOURCE_PASSWORD: ci_mysql_password
        run: docker compose config --quiet

      - name: Production compose config check
        env:
          JWT_SECRET: ci_dummy_jwt_secret_at_least_32_chars
          MYSQL_PASSWORD: ci_mysql_password
          MYSQL_ROOT_PASSWORD: ci_mysql_root_password
          POSTGRES_PASSWORD: ci_postgres_password
          SPRING_DATASOURCE_PASSWORD: ci_mysql_password
        run: docker compose -f docker-compose.prod.yml config --quiet

      - name: Backend compile
        working-directory: SanguiBlog-server
        run: mvn -q -DskipTests compile

      - name: Backend targeted tests
        working-directory: SanguiBlog-server
        run: mvn -q "-Dtest=StoragePathResolverTest,JwtAuthenticationFilterTest,UploadControllerAuthorizationTest" test

      - name: Frontend install
        working-directory: SanguiBlog-front
        run: npm ci --no-audit --no-fund

      - name: Frontend lint
        working-directory: SanguiBlog-front
        run: npm run lint

      - name: Frontend build
        working-directory: SanguiBlog-front
        run: npm run build

  build:
    name: Build and Push
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          SUFFIXES="sha-${SHORT_SHA}"

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            SUFFIXES="${SUFFIXES}
          main
          latest"
          fi

          CUSTOM="${{ inputs.image_tag }}"
          if [ -n "${CUSTOM}" ]; then
            SUFFIXES="${SUFFIXES}
          ${CUSTOM}"
          fi

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION_TAG=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            SUFFIXES="${SUFFIXES}
          v${VERSION_TAG}"
          fi

          BACKEND_TAGS=""
          WEB_TAGS=""
          while IFS= read -r suffix; do
            [ -z "$suffix" ] && continue
            BACKEND_TAGS="${BACKEND_TAGS}ghcr.io/wusangui571/sanguiblog/sanguiblog-backend:${suffix}
          "
            WEB_TAGS="${WEB_TAGS}ghcr.io/wusangui571/sanguiblog/sanguiblog-web:${suffix}
          "
          done <<< "$SUFFIXES"

          echo "backend_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BACKEND_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "web_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$WEB_TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./SanguiBlog-server
          file: ./SanguiBlog-server/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./SanguiBlog-front/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.web_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
