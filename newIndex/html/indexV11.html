<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三桂博客 - 想清楚，写简单</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800&family=Noto+Sans+SC:wght@100;400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 默认白天模式：冷调纸张感 */
            --bg-color: #f8f8fa;
            --text-main: #121212;
            --text-dim: rgba(0, 0, 0, 0.4);
            --accent: #000000;
            --nav-item-hover: #0066cc;
            --btn-border: rgba(0, 0, 0, 0.15);
            --img-opacity: 0.06; /* 调整背景图片透明度 */
            --transition: all 0.6s cubic-bezier(0.2, 1, 0.2, 1);
        }

        [data-theme="dark"] {
            /* 黑夜模式：极致纯黑 */
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.4);
            --accent: #ffffff;
            --nav-item-hover: #00d2ff;
            --btn-border: rgba(255, 255, 255, 0.2);
            --img-opacity: 0.08;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            transition: background-color 0.8s ease, color 0.8s ease;
            overflow-x: hidden;
        }

        /* --- 背景图片层：淡淡的纹理感 --- */
        .bg-image-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-image: url('bg.jpg'); /* 确保同级目录下有 bg.jpg */
            background-size: cover; background-position: center;
            filter: grayscale(100%) blur(2px);
            opacity: var(--img-opacity);
            z-index: 0; pointer-events: none;
            transition: opacity 0.8s ease;
        }

        /* --- 柔和环境光斑 --- */
        .orb {
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, var(--nav-item-hover) 0%, transparent 70%);
            opacity: 0.03; filter: blur(100px); z-index: 1; pointer-events: none;
            animation: orbFloat 20s infinite alternate ease-in-out;
        }
        @keyframes orbFloat { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }

        /* --- 优雅导航条 --- */
        nav {
            position: fixed; top: 0; width: 100%;
            padding: 40px 60px; display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }

        .nav-brand { display: flex; align-items: baseline; gap: 10px; text-decoration: none; }
        .nav-brand h2 { font-size: 1.1rem; font-weight: 800; color: var(--text-main); letter-spacing: 2px; }
        .version { font-size: 0.65rem; color: var(--text-dim); font-family: monospace; }

        .nav-links { display: flex; gap: 40px; list-style: none; }
        .nav-links a {
            text-decoration: none; color: var(--text-dim); font-size: 0.85rem;
            font-weight: 400; letter-spacing: 1px; transition: var(--transition);
            position: relative; padding-bottom: 5px;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-main); }
        .nav-links a.active::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; border-radius: 50%; background: var(--nav-item-hover);
        }

        .theme-toggle {
            cursor: pointer; background: none; border: 1px solid var(--btn-border);
            color: var(--text-main); padding: 7px 18px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 600; transition: var(--transition);
        }
        .theme-toggle:hover { border-color: var(--text-main); }

        /* --- Hero Section --- */
        .hero {
            position: relative; height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            z-index: 10; padding: 0 20px;
        }

        .hero-inner { transition: transform 0.1s ease-out; }

        .intro-text {
            font-size: 0.9rem; font-weight: 200; color: var(--text-dim);
            letter-spacing: 8px; text-transform: uppercase; margin-bottom: 25px;
            display: block; opacity: 0; animation: fadeIn 1.2s ease forwards;
        }

        h1 {
            font-size: clamp(2.2rem, 6vw, 4.2rem); font-weight: 900; line-height: 1.2;
            letter-spacing: -2px; opacity: 0; transform: translateY(30px);
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.3s;
        }

        h1 span {
            display: block; background: linear-gradient(180deg, var(--text-main) 30%, var(--text-dim) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* --- 重新设计的探索按钮 --- */
        .explore-btn-wrap {
            margin-top: 80px; opacity: 0; animation: fadeIn 1.5s ease forwards 1s;
        }

        .explore-btn {
            position: relative; display: inline-flex; align-items: center; gap: 15px;
            padding: 16px 40px; border: 1px solid var(--btn-border); border-radius: 50px;
            text-decoration: none; color: var(--text-main); font-size: 0.9rem;
            font-weight: 500; letter-spacing: 1px; overflow: hidden;
            transition: var(--transition);
        }

        .explore-btn span { position: relative; z-index: 2; }
        
        .explore-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--text-main); transition: var(--transition); z-index: 1;
        }

        .explore-btn:hover { color: var(--bg-color); transform: translateY(-5px); border-color: var(--text-main); }
        .explore-btn:hover::before { left: 0; }

        .arrow-icon {
            display: inline-block; font-size: 1.2rem; transition: transform 0.4s ease;
            position: relative; z-index: 2;
        }
        .explore-btn:hover .arrow-icon { transform: translateY(5px); }

        /* --- 动画帧 --- */
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* --- 下方文章列表锚点 --- */
        #content {
            position: relative; min-height: 100vh; background: var(--bg-color);
            z-index: 20; padding: 120px 80px; border-top: 1px solid var(--btn-border);
        }

        @media (max-width: 768px) {
            nav { padding: 30px; }
            .nav-links { display: none; } /* 移动端可隐藏或改为菜单 */
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body data-theme="light">

    <div class="bg-image-layer" id="bg-img"></div>
    <div class="orb"></div>

    <nav>
        <a href="#" class="nav-brand">
            <h2>三桂博客</h2>
            <span class="version">V2.2.5</span>
        </a>
        
        <ul class="nav-links">
            <li><a href="#" class="active">首页</a></li>
            <li><a href="#content">归档</a></li>
            <li><a href="#">工具</a></li>
            <li><a href="#">关于</a></li>
        </ul>

        <button class="theme-toggle" id="theme-btn">DARK MODE</button>
    </nav>

    <main class="hero">
        <div class="hero-inner" id="hero-wrap">
            <span class="intro-text">Hello, I am Sangui</span>
            <h1>
                <span>在这里把问题想清楚，</span>
                <span>把代码写简单。</span>
            </h1>

            <div class="explore-btn-wrap">
                <a href="#content" class="explore-btn">
                    <span>向下探索内容</span>
                    <span class="arrow-icon">↓</span>
                </a>
            </div>
        </div>
    </main>

    <section id="content">
        <h2 style="font-weight: 900; letter-spacing: 1px; margin-bottom: 50px;">ARCHIVES / 归档</h2>
        <div style="max-width: 800px; line-height: 2; color: var(--text-dim);">
            <p>设计不仅是视觉的堆砌，更是逻辑的延展。在这里，我记录下关于 AI、Java 工程化以及对简洁架构的执着追求。</p>
            <p style="margin-top: 30px; font-style: italic;">“Simplicity is the ultimate sophistication.”</p>
        </div>
    </section>

    <script>
        // 1. 主题切换
        const themeBtn = document.getElementById('theme-btn');
        let currentTheme = 'light';
        themeBtn.addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', currentTheme);
            themeBtn.innerText = currentTheme === 'light' ? 'DARK MODE' : 'LIGHT MODE';
        });

        // 2. 极其细微的鼠标视差
        const heroWrap = document.getElementById('hero-wrap');
        const bgImg = document.getElementById('bg-img');

        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 100;
            const y = (window.innerHeight / 2 - e.clientY) / 100;

            // 背景图随鼠标极慢反向位移
            bgImg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
            
            // 文字产生微小的正向位移，模拟深度
            heroWrap.style.transform = `translate(${-x}px, ${-y}px)`;
        });

        // 3. 滚动监听
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const opacity = 1 - scroll / 500;
            if (opacity >= 0) {
                heroWrap.style.opacity = opacity;
                heroWrap.style.transform = `translateY(${scroll * 0.15}px)`;
            }
        });
    </script>
</body>
</html>
