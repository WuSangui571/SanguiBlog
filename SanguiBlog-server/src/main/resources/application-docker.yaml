# Docker 容器部署配置 (spring.profiles.active=docker)
# 本文件提交 Git；密钥通过环境变量注入

server:
  forward-headers-strategy: native

jwt:
  secret: ${JWT_SECRET:${SPRING_JWT_SECRET:}}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/sanguiblog_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:sanguiblog_user}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: -1
      validation-timeout: 5000
      maximum-pool-size: 10
      minimum-idle: 2

storage:
  base-path: ${STORAGE_BASE_PATH:/data/uploads}

site:
  base-url: ${SITE_BASE_URL:http://localhost}
  allowed-hosts: ${SITE_ALLOWED_HOSTS:localhost}
  asset-base-url: ${SITE_ASSET_BASE_URL:}

security:
  cors:
    allowed-origins: ${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost}
  client-ip:
    # Docker 部署下，后端 immediate remoteAddr 为 Nginx 容器（docker bridge 网段）。
    # 信任该网段后才会读取 Nginx 透传的 X-Real-IP / X-Forwarded-For。
    trusted-proxies: ${SECURITY_CLIENT_IP_TRUSTED_PROXIES:172.16.0.0/12,10.0.0.0/8,192.168.0.0/16}

analytics:
  geo:
    ip2region:
      xdb-path: ${ANALYTICS_GEO_IP2REGION_XDB_PATH:classpath:ip2region/ip2region.xdb}

ai:
  rag:
    sync-on-startup: ${AI_RAG_SYNC_ON_STARTUP:false}
    pgvector:
      url: ${AI_RAG_PGVECTOR_URL:jdbc:postgresql://pgvector:5432/${POSTGRES_DB:sanguiblog_ai}}
      username: ${AI_RAG_PGVECTOR_USERNAME:${POSTGRES_USER:sanguiblog_pg_user}}
      password: ${AI_RAG_PGVECTOR_PASSWORD:${POSTGRES_PASSWORD:}}
