server:
  port: 8080
#  port: 8082

spring:
  config:
    import: "optional:classpath:application-local.yaml"
  application:
    name: SanguiBlog-server
  ai:
    dashscope:
      api-key: ${SPRING_AI_DASHSCOPE_API_KEY:${AI_DASHSCOPE_API_KEY:}}
      chat:
        options:
          model: ${AI_DASHSCOPE_CHAT_MODEL:qwen-flash}
          temperature: ${AI_DASHSCOPE_CHAT_TEMPERATURE:0.4}
      embedding:
        options:
          model: ${AI_DASHSCOPE_EMBEDDING_MODEL:text-embedding-v4}
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 60MB
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate.format_sql: false
  jackson:
    default-property-inclusion: non_null

jwt:
  expiration-minutes: 180
  issuer: sangui-blog

springdoc:
  swagger-ui:
    enabled: false
    path: /swagger-ui.html
  api-docs:
    enabled: false
    path: /api-docs

logging:
  level:
    com.sangui.sanguiblog: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

site:
  sitemap:
    cache-ttl-ms: ${SITE_SITEMAP_CACHE_TTL_MS:600000}
    refresh-delay-ms: ${SITE_SITEMAP_REFRESH_DELAY_MS:600000}
    max-urls-per-file: ${SITE_SITEMAP_MAX_URLS_PER_FILE:45000}
  version: "V2.2.20"
  hero:
    tagline: 我是三桂，在这里把问题想清楚，把代码写简单。
  home:
    signature-quote: 阻挡你的不是别人，而是你自己。
  footer:
    year: 2026
    brand: 三桂博客
    icp-number: 浙ICP备2025167176号
    icp-link: https://beian.miit.gov.cn/
    powered-by: Powered by Spring Boot 3 & React 19

analytics:
  page-views:
    archive:
      enabled: false
      cron: "0 20 3 * * *"
    cleanup:
      enabled: false
      retention-days: 180
      delete-batch-size: 5000
      backfill-all: true

ai:
  chat:
    context:
      max-messages: ${AI_CHAT_CONTEXT_MAX_MESSAGES:16}
    public-access:
      enabled: ${AI_CHAT_PUBLIC_ACCESS_ENABLED:true}
      visitor-cookie-name: ${AI_CHAT_PUBLIC_VISITOR_COOKIE_NAME:sg_ai_vid}
      guest-min-interval-ms: ${AI_CHAT_GUEST_MIN_INTERVAL_MS:4000}
      guest-per-visitor-hour: ${AI_CHAT_GUEST_PER_VISITOR_HOUR:8}
      guest-per-visitor-day: ${AI_CHAT_GUEST_PER_VISITOR_DAY:24}
      guest-per-ip-hour: ${AI_CHAT_GUEST_PER_IP_HOUR:20}
      guest-per-ip-day: ${AI_CHAT_GUEST_PER_IP_DAY:60}
      guest-captcha-strike-threshold: ${AI_CHAT_GUEST_CAPTCHA_STRIKE_THRESHOLD:3}
      guest-block-strike-threshold: ${AI_CHAT_GUEST_BLOCK_STRIKE_THRESHOLD:6}
      guest-block-duration: ${AI_CHAT_GUEST_BLOCK_DURATION:20m}
      guest-global-daily-budget: ${AI_CHAT_GUEST_GLOBAL_DAILY_BUDGET:500}
      user-min-interval-ms: ${AI_CHAT_USER_MIN_INTERVAL_MS:3000}
      user-per-hour: ${AI_CHAT_USER_PER_HOUR:60}
      user-per-day: ${AI_CHAT_USER_PER_DAY:240}
  rag:
    enabled: ${AI_RAG_ENABLED:false}
    top-k: ${AI_RAG_TOP_K:6}
    similarity-threshold: ${AI_RAG_SIMILARITY_THRESHOLD:0.72}
    sync-on-startup: ${AI_RAG_SYNC_ON_STARTUP:true}
    pgvector:
      url: ${AI_RAG_PGVECTOR_URL:}
      username: ${AI_RAG_PGVECTOR_USERNAME:}
      password: ${AI_RAG_PGVECTOR_PASSWORD:}
      schema: ${AI_RAG_PGVECTOR_SCHEMA:public}
      table: ${AI_RAG_PGVECTOR_TABLE:vector_store}
      initialize-schema: ${AI_RAG_PGVECTOR_INITIALIZE_SCHEMA:false}





